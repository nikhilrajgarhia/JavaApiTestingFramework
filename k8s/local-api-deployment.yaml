apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: local-api
  template:
    metadata:
      labels:
        app: local-api
    spec:
      containers:
        - name: local-api
          image: java-api-framework/local-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9876
          env:
            - name: SERVER_PORT
              value: "9876"
          readinessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 10

